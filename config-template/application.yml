# ============================================
# 智慧幼儿园成长管理系统 - 配置文件模板
# ============================================

# ===================
# 数据库配置 (各服务)
# ===================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kgms?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

# ===================
# Redis配置
# ===================
  data:
    redis:
      host: localhost
      port: 6379

# ===================
# AI服务配置
# ===================
ai:
  # 是否启用AI服务
  enabled: true
  # AI服务提供商: baidu/alibaba
  provider: baidu

  # 百度AI配置
  baidu-api-key: your-baidu-api-key
  baidu-secret-key: your-baidu-secret-key
  baidu-endpoint: https://aip.baidubce.com

  # 阿里AI配置
  aliyun-access-key-id: your-aliyun-access-key-id
  aliyun-access-key-secret: your-aliyun-access-key-secret

  # 视频生成配置
  video-generate-timeout: 300
  video-max-retries: 3
  default-video-template: template_v1
  video-resolution: 1920x1080
  video-fps: 30

  # 图像识别配置
  image-recognition-enabled: true
  face-recognition-enabled: true
  scene-recognition-enabled: true

# ===================
# 微信小程序配置
# ===================
wechat:
  miniapp:
    # 微信小程序AppID
    app-id: your-app-id
    # 微信小程序AppSecret
    app-secret: your-app-secret

    # 消息模板ID (需要在微信后台配置)
    template-record: xxxxxxxx  # 成长记录通知模板ID
    template-report: xxxxxxxx  # 月度报告通知模板ID
    template-video: xxxxxxxx   # 成长视频通知模板ID
    template-notice: xxxxxxxx  # 系统通知模板ID
    template-food: xxxxxxxx    # 食谱通知模板ID

    # 是否启用微信登录
    login-enabled: true
    # 是否启用消息推送
    push-enabled: true

# ===================
# 文件存储配置
# ===================
file:
  oss:
    endpoint: https://oss-cn-shanghai.aliyuncs.com
    bucket: your-bucket-name
    access-key: your-access-key
    secret-key: your-secret-key

# ===================
# Nacos配置中心 (可选)
# ===================
spring:
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: dev
      config:
        server-addr: localhost:8848
        namespace: dev
        file-extension: yml