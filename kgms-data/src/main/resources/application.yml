server:
  port: 8086

spring:
  application:
    name: kgms-data
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.kgms.data.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.kgms: debug
